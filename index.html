<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamá: Entre Altares y Algoritmos - La Casa de Juanita</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Lora:italic@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #c68b6d;
            --primary-dark: #a36a4d;
            --bg-warm: #fdfcf9;
            --text-main: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f1ede8; color: var(--text-main); }
        .font-serif { font-family: 'Lora', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        [x-cloak] { display: none !important; }

        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        
        .input-elegant {
            width: 100%;
            padding: 1rem 1.25rem 1rem 3.25rem;
            background-color: white;
            border: 1px solid #f1f5f9;
            border-radius: 1.25rem;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            color: #1e293b;
        }
        .input-elegant:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(198, 139, 109, 0.08);
        }

        .btn-primary {
            width: 100%;
            padding: 1.125rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 900;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 1.25rem;
            box-shadow: 0 10px 20px -5px rgba(198, 139, 109, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 15px 30px -5px rgba(198, 139, 109, 0.5); }

        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scale-up { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-scale-up { animation: scale-up 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* MODO OSCURO */
        .dark-mode { background-color: #0f172a !important; color: #f1f5f9 !important; }
        .dark-mode .glass { background: rgba(15, 23, 42, 0.85) !important; border-color: rgba(255, 255, 255, 0.1) !important; }
        .dark-mode .bg-white { background-color: #1e293b !important; color: #f1f5f9 !important; border-color: #334155 !important; }
        .dark-mode .text-slate-900, .dark-mode .text-slate-800 { color: #f8fafc !important; }
        .dark-mode .text-slate-600, .dark-mode .text-slate-500 { color: #94a3b8 !important; }
        .dark-mode .bg-[#fdfcf9] { background-color: #0f172a !important; }
        .dark-mode .bg-slate-50 { background-color: #334155 !important; }
        .dark-mode .border-slate-100 { border-color: #334155 !important; }
        .dark-mode .input-elegant { background-color: #1e293b !important; color: white !important; border-color: #334155 !important; }
    </style>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxChmGHzMS3mK9AfTgwwtD6Ev7k91pRws5bt5MPLJemYbT1bEJrSHa5RnUHzpTlBdQf/exec";

        // Inicialización oficial de Alpine.js para evitar errores de referencia
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                view: 'auth',
                authStep: 'input',
                authMode: 'login', // 'login' o 'register'
                userName: '',
                userEmail: '',
                userPassword: '',
                verificationCode: '',
                isSubmitting: false,
                isMuted: true,
                activeStep: 0,
                completedSteps: [],
                reflections: {},
                bibleVersion: 'NTV',
                selectedCategory: 'Todos',
                progress: 0,
                expandedBibleSteps: [],
                darkMode: false,
                categories: ["Todos", "Fe", "Vida", "Propósito", "Relaciones"],
                
                // Contenido del Devocional (Textos Justificados)
                roadmap: [
                    { 
                        title: "El Hilo Invisible", 
                        subtitle: "Introducción", 
                        context: "Imagina un hilo de seda que recorre décadas de historia. No se rompe, solo cambia de color. Ese hilo es la influencia de una madre. Hoy no solo miramos hacia atrás con nostalgia, sino con curiosidad: ¿Qué semillas plantaron nuestras abuelas que aún florecen hoy? ¿Y qué semillas estamos plantando nosotras en un mundo lleno de pantallas?", 
                        verse_rvr: "Trayendo a la memoria la fe no fingida que hay en ti, la cual habitó primero en tu abuela Loida, y en tu madre Eunice, y estoy cierto que en ti también.", 
                        verse_ntv: "Me acuerdo de tu fe sincera, pues tú tienes la misma fe de la que primero se alimentaron tu abuela Loida y tu madre, Eunice, y sé que esa fe sigue viva en ti.", 
                        ref: "2 Timoteo 1:5", 
                        question: "¿Qué semillas plantaron tus abuelas que aún florecen hoy?" 
                    },
                    { 
                        title: "Presencia y Tradición", 
                        subtitle: "Los 60s", 
                        context: "Una era de rituales. El olor al desayuno, la mesa como el centro del universo y la iglesia como el eje social. La madre era la guardiana del hogar, enfocada en la formación del carácter a través de la constancia. La seguridad se encontraba en el orden y la provisión emocional.", 
                        verse_rvr: "Se levanta aun de noche y da comida a su familia y ración a sus criadas... Fuerza y honor son su vestidura; y se ríe de lo por venir.", 
                        verse_ntv: "Se levanta de madrugada para preparar el desayuno para su familia y planificar las labores de sus criadas... Está vestida de fortaleza y dignidad, y se ríe sin temor al futuro.", 
                        ref: "Proverbios 31:15, 25", 
                        question: "¿Qué olor o sonido de tu infancia te recuerda a la fe de tu madre?" 
                    },
                    { 
                        title: "Resiliencia en el Cambio", 
                        subtitle: "Los 70s", 
                        context: "Las madres de los 70 enseñaron resiliencia: cómo mantener la fe cuando el mundo exterior empieza a gritar más fuerte que las tradiciones. Es una década de cuestionamientos y búsqueda de identidad donde la mujer comenzó a ganar espacios masivos fuera del hogar.", 
                        verse_rvr: "Mujer virtuosa, ¿quién la hallará? Porque su estima sobrepasa largamente a la de las piedras preciosas... No tiene temor de la nieve por su familia, porque toda su familia está vestida de ropas dobles.", 
                        verse_ntv: "¿Quién podrá encontrar una esposa virtuosa y capaz? Es más preciosa que los rubíes... No tiene miedo al frío por su familia, porque todos tienen ropas abrigadas.", 
                        ref: "Proverbios 31:10, 21", 
                        question: "¿Cómo manejas la tensión entre lo externo y tu hogar?" 
                    },
                    { 
                        title: "La Era de la Influencia", 
                        subtitle: "Los 80s", 
                        context: "La fe se transmitía en el trayecto, en la conversación casual, integrando a Dios en la cotidianidad acelerada. En una década marcada por el consumo y la cultura pop, la influencia se volvió activa para proteger los valores frente a la omnipresente televisión.", 
                        verse_rvr: "Y estas palabras que yo te mando hoy, estarán sobre tu corazón; y las repetirás a tus hijos, y hablarás de ellas estando en tu casa, y andando por el camino, y al acostarte, y cuando te levantes.", 
                        verse_ntv: "Debes comprometerte con todo tu ser a cumplir estas decisiones que te entrego hoy. Repíteselas a tus hijos una y otra vez. Habla de ellas en tus conversaciones cuando estés en tu casa.", 
                        ref: "Deuteronomio 6:6-7", 
                        question: "¿Qué conversación 'en el camino' marcó tu fe?" 
                    },
                    { 
                        title: "Conexión y Prudencia", 
                        subtitle: "Los 90s", 
                        context: "El rol mutó hacia la mediación: explicar el mundo a los hijos frente a la transición digital. Se valoró más la inteligencia emocional y la comunicación abierta, convirtiendo a la madre en el filtro necesario para procesar los cambios rápidos del entorno.", 
                        verse_rvr: "Asimismo, las ancianas deben ser reverentes en su conducta... que enseñen a las mujeres jóvenes a amar a sus maridos y a sus hijos, a ser prudentes, castas, cuidadosas de su casa, buenas...", 
                        verse_ntv: "Enseña a las mujeres mayores a vivir de una manera que demuestre reverencia... deben instruir a las mujeres más jóvenes a amar a sus esposos y a sus hijos, a vivir sabiamente.", 
                        ref: "Tito 2:3-5", 
                        question: "¿Sientes que eres un 'puente' o un 'muro' en temas difíciles?" 
                    },
                    { 
                        title: "La Era del Algoritmo", 
                        subtitle: "El Hoy", 
                        context: "No compites con la vecina, compites con un algoritmo. El reto es recuperar la intencionalidad frente al exceso de comparación de las redes sociales. Amoldarse hoy significa dejar que Instagram dicte tu valor; renovar la mente es volver a la identidad que Dios te da.", 
                        verse_rvr: "No os conforméis a este siglo, sino transformaos por medio de la renovación de vuestro entendimiento, para que comprobéis cuál sea la buena voluntad de Dios, agradable y perfecta.", 
                        verse_ntv: "No se amolden a la conducta ni a las costumbres de este mundo, más bien dejen que Dios los transforme en personas nuevas al cambiarles la manera de pensar.", 
                        ref: "Romanos 12:2", 
                        question: "¿Cómo planeas proteger tu identidad hoy?" 
                    },
                    { 
                        title: "Oración y Legado", 
                        subtitle: "Conclusión", 
                        context: "La maternidad ha cambiado de forma, pero su esencia es eterna: ser el reflejo del amor incondicional de Dios. No importa en qué década naciste; el Espíritu Santo es el mismo ayer, hoy y siempre. Tu mirada será el refugio de tus hijos.", 
                        verse_rvr: "Padre, gracias por las mujeres que me precedieron. Gracias por sus oraciones, que hoy son mi suelo. Ayúdame a ser una madre que no busca perfección, sino presencia. Que mis hijos no recuerden mi teléfono, sino mis ojos. Amén.", 
                        verse_ntv: "Dios, gracias por el legado de las que abrieron el camino. Dame la sabiduría para estar presente y que mi mirada sea el refugio de mis hijos en este mundo digital. Amén.", 
                        ref: "Oración Final", 
                        question: "Acción: Recupera la mesa hoy. ¿Qué paso darás?" 
                    }
                ],

                // Biblioteca de otros devocionales (Textos Justificados)
                otherDevotionals: [
                    { title: "La Ciencia de Atrapar el Viento", url: "https://innovacion-con-clase.github.io/la-ciencia-de-atrapar-el-viento/", icon: 'wind', color: "bg-blue-50 text-blue-600", cat: "Fe" },
                    { title: "Ordena tus Letras", url: "https://innovacion-con-clase.github.io/Ordena-tus-Letras/", icon: 'pen-tool', color: "bg-amber-50 text-amber-600", cat: "Propósito" },
                    { title: "ADN de Rescatista", url: "https://innovacion-con-clase.github.io/ADN-de-Rescatista/", icon: 'shield', color: "bg-red-50 text-red-600", cat: "Vida" },
                    { title: "La mesa esta servida", url: "https://innovacion-con-clase.github.io/la-mesa-esta-servida/", icon: 'table', color: "bg-stone-50 text-stone-700", cat: "Vida" },
                    { title: "Sanando el Corazón", url: "#", icon: 'heart', color: "bg-rose-50 text-rose-500", cat: "Relaciones" }
                ],

                init() {
                    const savedMode = localStorage.getItem('juanita_dark_mode');
                    if (savedMode) this.darkMode = JSON.parse(savedMode);

                    const savedUser = localStorage.getItem('juanita_user');
                    if (savedUser) {
                        const user = JSON.parse(savedUser);
                        this.userName = user.name;
                        this.userEmail = user.email;
                        this.view = 'home';
                    }
                    this.refreshUI();
                    this.$watch('view', () => this.refreshUI());
                    this.$watch('selectedCategory', () => this.refreshUI());
                },

                refreshUI() {
                    this.$nextTick(() => {
                        lucide.createIcons();
                        const scrollArea = document.getElementById('readingScroll');
                        if (scrollArea) scrollArea.scrollTop = 0;
                    });
                },

                get filteredPlans() {
                    return this.selectedCategory === 'Todos' ? this.otherDevotionals : this.otherDevotionals.filter(p => p.cat === this.selectedCategory);
                },

                async login() {
                    if (!this.userEmail || !this.userPassword) {
                        alert("Ingresa tus credenciales.");
                        return;
                    }
                    this.isSubmitting = true;
                    try {
                        const res = await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ 
                                action: 'login', 
                                email: this.userEmail, 
                                password: this.userPassword 
                            })
                        });
                        const data = await res.json();
                        if (data.status === 200) {
                            this.userName = data.name;
                            localStorage.setItem('juanita_user', JSON.stringify({ name: data.name, email: data.email }));
                            this.view = 'home';
                        } else {
                            alert(data.message || "Error al iniciar sesión");
                        }
                    } catch (e) {
                        // Simulación para propósitos de demo si el script no responde
                        console.error(e);
                        alert("Error de conexión. Verifica tus datos.");
                    } finally {
                        this.isSubmitting = false;
                    }
                },

                async sendCode() {
                    if (!this.userName || !this.userEmail || !this.userPassword) {
                        alert("Por favor completa todos los campos.");
                        return;
                    }
                    this.isSubmitting = true;
                    try {
                        await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({ action: 'sendOTP', email: this.userEmail, name: this.userName })
                        });
                        this.authStep = 'verify';
                    } catch (e) {
                        console.error(e);
                        this.authStep = 'verify';
                    } finally {
                        this.isSubmitting = false;
                    }
                },

                async verifyAndRegister() {
                    if (this.verificationCode.length < 4) return;
                    this.isSubmitting = true;
                    try {
                        const res = await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ 
                                action: 'register', 
                                name: this.userName, 
                                email: this.userEmail, 
                                password: this.userPassword,
                                code: this.verificationCode 
                            })
                        });
                        const data = await res.json();
                        if (data.status === 200) {
                            localStorage.setItem('juanita_user', JSON.stringify({ name: this.userName, email: this.userEmail }));
                            this.view = 'video_intro';
                        } else {
                            alert(data.message || "Código inválido");
                        }
                    } catch (e) {
                        console.error(e);
                        // Demo fallback
                        localStorage.setItem('juanita_user', JSON.stringify({ name: this.userName, email: this.userEmail }));
                        this.view = 'video_intro';
                    } finally {
                        this.isSubmitting = false;
                    }
                },

                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('juanita_dark_mode', JSON.stringify(this.darkMode));
                },

                toggleBibleStep(index) {
                    if (this.expandedBibleSteps.includes(index)) {
                        this.expandedBibleSteps = this.expandedBibleSteps.filter(i => i !== index);
                    } else {
                        this.expandedBibleSteps.push(index);
                    }
                },

                getNextStep() {
                    for (let i = 0; i < this.roadmap.length; i++) {
                        if (!this.completedSteps.includes(i)) return i;
                    }
                    return -1;
                },

                logout() {
                    localStorage.removeItem('juanita_user');
                    this.userName = '';
                    this.userEmail = '';
                    this.userPassword = '';
                    this.authMode = 'login';
                    this.authStep = 'input';
                    this.view = 'auth';
                },

                async markStepComplete() {
                    const content = this.reflections[this.activeStep];
                    if (content) {
                        try {
                            fetch(APPS_SCRIPT_URL, {
                                method: 'POST',
                                mode: 'no-cors',
                                body: JSON.stringify({ 
                                    action: 'feedback', 
                                    email: this.userEmail, 
                                    stepIndex: this.activeStep, 
                                    content: content 
                                })
                            });
                        } catch (e) { console.error("Error saving feedback:", e); }
                    }

                    if (!this.completedSteps.includes(this.activeStep)) {
                        this.completedSteps.push(this.activeStep);
                        this.progress = Math.round((this.completedSteps.length / this.roadmap.length) * 100);
                    }
                    if (this.activeStep === 6) this.view = 'success';
                    else { this.activeStep++; this.refreshUI(); }
                }
            }));
        });
    </script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-200 antialiased flex items-center justify-center min-h-screen">

    <div x-data="appData()" :class="darkMode ? 'dark-mode' : ''" class="relative w-full max-w-md h-screen sm:h-[880px] bg-[#fdfcf9] shadow-2xl flex flex-col overflow-hidden border border-slate-100 transition-colors duration-500">
        
        <template x-if="view === 'auth'">
            <div class="h-full w-full bg-[#fdfcf9] flex flex-col items-center justify-between p-10 animate-fade-in overflow-y-auto no-scrollbar relative">
                <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');"></div>
                
                <div class="w-full flex flex-col items-center pt-10">
                    <div class="mb-12 relative">
                        <div class="absolute -inset-8 bg-[#c68b6d]/10 blur-3xl rounded-full"></div>
                        <img src="https://i.imgur.com/dDYOrEm.png" alt="LJ" class="w-32 relative z-10">
                    </div>
                    
                    <div x-show="authStep === 'input'" class="w-full text-center animate-scale-up">
                        <h1 class="text-3xl font-black text-slate-900 mb-2" x-text="authMode === 'login' ? 'Bienvenida de nuevo' : 'Bienvenida a Casa'"></h1>
                        <p class="text-slate-500 mb-10 text-sm" x-text="authMode === 'login' ? 'Nos alegra verte otra vez.' : 'Crea tu perfil para comenzar este viaje de fe.'"></p>
                        
                        <form @submit.prevent="authMode === 'login' ? login() : sendCode()" class="space-y-5 px-4">
                            <div x-show="authMode === 'register'" x-transition class="relative">
                                <div class="absolute left-5 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
                                    <i data-lucide="user" class="text-slate-300 w-5 h-5 transition-colors group-focus-within:text-[#c68b6d]"></i>
                                </div>
                                <input type="text" :required="authMode === 'register'" placeholder="Nombre completo" x-model="userName" class="input-elegant">
                            </div>
                            <div class="relative group">
                                <div class="absolute left-5 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
                                    <i data-lucide="mail" class="text-slate-300 w-5 h-5 transition-colors group-focus-within:text-[#c68b6d]"></i>
                                </div>
                                <input type="email" required placeholder="Correo electrónico" x-model="userEmail" class="input-elegant">
                            </div>
                            <div class="relative group">
                                <div class="absolute left-5 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
                                    <i data-lucide="lock" class="text-slate-300 w-5 h-5 transition-colors group-focus-within:text-[#c68b6d]"></i>
                                </div>
                                <input type="password" required placeholder="Contraseña" x-model="userPassword" class="input-elegant">
                            </div>
                            <div class="pt-2">
                                <button type="submit" class="btn-primary">
                                    <span x-show="!isSubmitting" x-text="authMode === 'login' ? 'ENTRAR AHORA' : 'OBTENER CÓDIGO'"></span>
                                    <div x-show="isSubmitting" class="flex justify-center items-center gap-1">
                                        <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></div>
                                        <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                        <div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                    </div>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div x-show="authStep === 'verify'" class="w-full text-center animate-scale-up">
                        <h1 class="text-3xl font-black text-slate-900 mb-2">Verifica tu Correo</h1>
                        <p class="text-slate-500 mb-10 text-sm">Ingresa el código enviado a <br><b class="text-slate-900" x-text="userEmail"></b></p>
                        <form @submit.prevent="verifyAndRegister()" class="space-y-6">
                            <div class="flex justify-center">
                                <input type="text" maxlength="4" required placeholder="0000" x-model="verificationCode" class="w-48 text-center text-4xl font-black py-5 bg-white border border-slate-100 rounded-[2rem] tracking-[12px] outline-none focus:border-[#c68b6d] focus:ring-4 focus:ring-[#c68b6d]/5 shadow-sm">
                            </div>
                            <button type="submit" class="btn-primary">VERIFICAR Y ACCEDER</button>
                        </form>
                    </div>
                </div>

                <div x-show="authStep === 'input'" class="w-full pb-10 text-center animate-fade-in">
                    <p class="text-slate-400 text-sm mb-4" x-text="authMode === 'login' ? '¿Aún no tienes cuenta?' : '¿Ya eres parte de la casa?'"></p>
                    <button @click="authMode = authMode === 'login' ? 'register' : 'login'" class="text-[#c68b6d] font-black tracking-widest text-xs uppercase hover:underline" x-text="authMode === 'login' ? 'CREAR CUENTA NUEVA' : 'INICIAR SESIÓN'"></button>
                </div>
                
                <button x-show="authStep === 'verify'" @click="authStep = 'input'" type="button" class="text-xs font-black text-[#c68b6d] uppercase tracking-widest mb-10 hover:underline">Corregir mis datos</button>
            </div>
        </template>

        <!-- PANTALLA: INTRO VIDEO -->
        <template x-if="view === 'video_intro'">
            <div class="relative h-full w-full bg-black flex flex-col animate-fade-in overflow-hidden">
                <video autoplay loop :muted="isMuted" playsinline class="absolute inset-0 w-full h-full object-cover opacity-60"><source src="https://i.imgur.com/XOKwR06.mp4" type="video/mp4"></video>
                <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black"></div>
                <div class="relative z-10 flex flex-col h-full p-10 text-white text-left">
                    <div class="mt-12 space-y-2">
                        <img src="https://i.imgur.com/dDYOrEm.png" alt="LJ" class="w-20 mb-4 brightness-200">
                        <h1 class="text-5xl font-black leading-[0.9]">Mamá:<br>Entre Altares y Algoritmos</h1>
                    </div>
                    <div class="mt-auto space-y-6 text-left">
                        <p class="text-xl font-serif italic text-white/90 text-justify">"La fe no aparece de la nada; es un ecosistema que se cultiva en el hogar."</p>
                        <button @click="view = 'home'" class="w-full py-6 bg-[#c68b6d] text-white rounded-[2rem] font-black shadow-2xl shadow-black/40 flex items-center justify-center gap-4 group active:scale-95 transition-all">
                            COMENZAR VIAJE 
                            <i data-lucide="arrow-right" class="group-hover:translate-x-2 transition-transform"></i>

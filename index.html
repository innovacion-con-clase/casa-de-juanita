                    { title: "Sanando el Corazón", url: "#", icon: 'heart', color: "bg-rose-50 text-rose-500", cat: "Relaciones" }
                ],

                init() {
                    const savedMode = localStorage.getItem('juanita_dark_mode');
                    if (savedMode) this.darkMode = JSON.parse(savedMode);

                    // Inicializar datos de progreso de todos los devocionales
                    const savedProgress = localStorage.getItem('juanita_progress_data');
                    this.progressData = savedProgress ? JSON.parse(savedProgress) : {};
                    this.devocionales.forEach(dev => {
                        if (!this.progressData[dev.id]) {
                            this.progressData[dev.id] = {
                                activeStep: 0,
                                completedSteps: [],
                                reflections: {},
                                progress: 0
                            };
                        }
                    });

                    // Cargar último devocional seleccionado o default 'edicion_limitada' (semana activa)
                    const savedDevId = localStorage.getItem('juanita_selected_dev_id') || 'edicion_limitada';
                    this.selectDevocional(savedDevId);

                    const savedUser = localStorage.getItem('juanita_user');
                    if (savedUser) {
                        const user = JSON.parse(savedUser);
                        this.userName = user.name;
                        this.userEmail = user.email;
                        this.isGuest = false;

                        // Si ya está "en marcha" (progreso > 0), va directo al plan_overview. Si es nuevo, va a la Portada!
                        const progress = this.progressData[savedDevId] ? this.progressData[savedDevId].progress : 0;
                        this.view = progress > 0 ? 'plan_overview' : 'video_intro';
                    } else {
                        // Flujo prioritario: Si no hay usuario, entra como invitado de inmediato
                        this.isGuest = true;
                        this.userName = '';
                        this.view = 'video_intro';
                    }

                    this.refreshUI();
                    this.$watch('view', () => this.refreshUI());
                    this.$watch('selectedCategory', () => this.refreshUI());
                },

                selectDevocional(devId) {
                    // Guardar progreso actual del devocional activo
                    if (this.selectedDevocional) {
                        this.progressData[this.selectedDevocional.id] = {
                            activeStep: this.activeStep,
                            completedSteps: [...this.completedSteps],
                            reflections: {...this.reflections},
                            progress: this.progress
                        };
                        localStorage.setItem('juanita_progress_data', JSON.stringify(this.progressData));
                    }

                    // Seleccionar nuevo devocional
                    const newDev = this.devocionales.find(d => d.id === devId);
                    if (newDev) {
                        this.selectedDevocional = newDev;
                        localStorage.setItem('juanita_selected_dev_id', devId);

                        const data = this.progressData[devId] || {
                            activeStep: 0,
                            completedSteps: [],
                            reflections: {},
                            progress: 0
                        };

                        this.activeStep = data.activeStep;
                        this.completedSteps = data.completedSteps;
                        this.reflections = data.reflections;
                        this.progress = data.progress;
                    }
                    this.refreshUI();
                },

                openDevocional(devId) {
                    this.selectDevocional(devId);
                    this.view = 'video_intro';
                },

                refreshUI() {
                    this.$nextTick(() => {
                        lucide.createIcons();
                        // Reset scroll de lectura con un pequeño retraso para asegurar que el DOM se actualizó
                        setTimeout(() => {
                            const scrollArea = document.getElementById('readingScroll');
                            if (scrollArea) {
                                scrollArea.scrollTo({ top: 0, behavior: 'smooth' });
                            }
                            // Reset scroll general
                            const mainScroll = document.querySelector('.overflow-y-auto');
                            if (mainScroll && this.view !== 'reading') {
                                mainScroll.scrollTo({ top: 0, behavior: 'instant' });
                            }
                        }, 10);
                    });
                },

                get filteredPlans() {
                    return this.selectedCategory === 'Todos' ? this.otherDevotionals : this.otherDevotionals.filter(p => p.cat === this.selectedCategory);
                },

                async login() {
                    if (!this.userEmail || !this.userPassword) {
                        alert("Ingresa tus credenciales.");
                        return;
                    }
                    this.isSubmitting = true;
                    try {
                        const res = await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ 
                                action: 'login', 
                                email: this.userEmail, 
                                password: this.userPassword 
                            })
                        });
                        const data = await res.json();
                        if (data.status === 200) {
                            this.userName = data.name;
                            localStorage.setItem('juanita_user', JSON.stringify({ name: data.name, email: data.email }));
                            this.view = 'video_intro';
                        } else {
                            alert(data.message || "Error al iniciar sesión");
                        }
                    } catch (e) {
                        // Simulación para propósitos de demo si el script no responde
                        console.error(e);
                        alert("Error de conexión. Verifica tus datos.");
                    } finally {
                        this.isSubmitting = false;
                    }
                },

                async sendCode() {
                    if (!this.userName || !this.userEmail || !this.userPassword) {
                        alert("Por favor completa todos los campos.");
                        return;
                    }
                    this.isSubmitting = true;
                    try {
                        await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({ action: 'sendOTP', email: this.userEmail, name: this.userName })
                        });
                        this.authStep = 'verify';
                    } catch (e) {
                        console.error(e);
                        this.authStep = 'verify';
                    } finally {
                        this.isSubmitting = false;
                    }
                },

                async verifyAndRegister() {
                    if (this.verificationCode.length < 4) return;
                    this.isSubmitting = true;
                    try {
                        const res = await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ 
                                action: 'register', 
                                name: this.userName, 
                                email: this.userEmail, 
                                password: this.userPassword,
                                code: this.verificationCode 
                            })
                        });
                        const data = await res.json();
                        if (data.status === 200) {
                            localStorage.setItem('juanita_user', JSON.stringify({ name: this.userName, email: this.userEmail }));
                            this.view = 'video_intro';
                        } else {
                            alert(data.message || "Código inválido");
                        }
                    } catch (e) {
                        console.error(e);
                        // Demo fallback
                        localStorage.setItem('juanita_user', JSON.stringify({ name: this.userName, email: this.userEmail }));
                        this.view = 'video_intro';
                    } finally {
                        this.isSubmitting = false;
                    }
                },

                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('juanita_dark_mode', JSON.stringify(this.darkMode));
                },

                toggleBibleStep(index) {
                    if (this.expandedBibleSteps.includes(index)) {
                        this.expandedBibleSteps = this.expandedBibleSteps.filter(i => i !== index);
                    } else {
                        this.expandedBibleSteps.push(index);
                    }
                },

                getNextStep() {
                    for (let i = 0; i < this.roadmap.length; i++) {
                        if (!this.completedSteps.includes(i)) return i;
                    }
                    return -1;
                },

                logout() {
                    localStorage.removeItem('juanita_user');
                    localStorage.removeItem('juanita_guest');
                    this.userName = '';
                    this.userEmail = '';
                    this.userPassword = '';
                    this.isGuest = false;
                    this.authMode = 'login';
                    this.authStep = 'input';
                    this.view = 'auth';
                },

                continueAsGuest() {
                    this.isGuest = true;
                    this.userName = '';
                    localStorage.setItem('juanita_guest', 'true');
                    this.view = 'video_intro';
                },

                async markStepComplete() {
                    const content = this.reflections[this.activeStep];
                    // Solo enviar feedback si no es invitado
                    if (content && !this.isGuest) {
                        try {
                            // Prefijar la reflexión con el nombre del devocional para identificarla en Google Sheets sin cambiar el backend
                            const prefixedContent = "[" + this.selectedDevocional.title + "] " + content;
                            fetch(APPS_SCRIPT_URL, {
                                method: 'POST',
                                mode: 'no-cors',
                                body: JSON.stringify({ 
                                    action: 'feedback', 
                                    email: this.userEmail, 
                                    stepIndex: this.activeStep, 
                                    content: prefixedContent 
                                })
                            });
                        } catch (e) { console.error("Error saving feedback:", e); }
                    }

                    if (!this.completedSteps.includes(this.activeStep)) {
                        this.completedSteps.push(this.activeStep);
                        this.progress = Math.round((this.completedSteps.length / this.roadmap.length) * 100);
                        
                        // Guardar en progressData inmediatamente para que se sincronice en el Home
                        if (this.selectedDevocional) {
                            this.progressData[this.selectedDevocional.id] = {
                                activeStep: this.activeStep,
                                completedSteps: [...this.completedSteps],
                                reflections: {...this.reflections},
                                progress: this.progress
                            };
                            localStorage.setItem('juanita_progress_data', JSON.stringify(this.progressData));
                        }
                    }
                    
                    if (this.activeStep === this.roadmap.length - 1) {
                        this.view = 'success';
                    } else { 
                        this.activeStep++; 
                        
                        // Actualizar activeStep en progressData al avanzar de estación
                        if (this.selectedDevocional) {
                            this.progressData[this.selectedDevocional.id].activeStep = this.activeStep;
                            localStorage.setItem('juanita_progress_data', JSON.stringify(this.progressData));
                        }
                        
                        this.view = 'plan_overview';
                        this.refreshUI(); 
                    }
                },

                openPlan(dev) {
                    if (this.isGuest) {
                        this.view = 'unlock_premium';
                    } else if (dev.localId) {
                        this.openDevocional(dev.localId);
                    } else {
                        window.open(dev.url, '_blank');
                    }
                }
            }));
        });
    </script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

                            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
                        </button>
                        <button class="w-full p-6 bg-white border border-slate-100 rounded-[2rem] flex items-center gap-4 hover:bg-slate-50 transition-colors">
                            <div class="w-10 h-10 bg-amber-50 text-amber-500 rounded-xl flex items-center justify-center"><i data-lucide="star" class="w-5 h-5"></i></div>
                            <span class="flex-1 text-left font-black text-slate-700">Calificar App</span>
                            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
                        </button>
                        <template x-if="!isGuest">
                            <button @click="logout()" class="w-full p-6 bg-red-50/50 border border-red-100 rounded-[2rem] flex items-center gap-4 hover:bg-red-50 transition-colors group">
                                <div class="w-10 h-10 bg-red-100 text-red-500 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform"><i data-lucide="log-out" class="w-5 h-5"></i></div>
                                <span class="flex-1 text-left font-black text-red-600">Cerrar Sesión</span>
                            </button>
                        </template>

                        <template x-if="isGuest">
                            <button @click="authMode = 'register'; authStep = 'input'; view = 'auth'" class="w-full p-8 bg-[#c68b6d] text-white rounded-[2.5rem] flex flex-col items-center gap-4 shadow-xl shadow-[#c68b6d]/20 group active:scale-95 transition-all">
                                <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mb-2">
                                    <i data-lucide="user-plus" class="w-8 h-8"></i>
                                </div>
                                <span class="font-black text-lg tracking-tight">REGISTRARME AHORA</span>
                                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Sincroniza tu progreso en la nube</p>
                            </button>
                        </template>
                    </div>

                    <div class="pt-10 text-center">
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">La Casa de Juanita v1.2</p>
                    </div>
                </div>
            </div>
        </template>

        <!-- PANTALLA: UNLOCK PREMIUM (INVITADOS) -->
        <template x-if="view === 'unlock_premium'">
            <div class="h-full flex flex-col items-center justify-center p-12 text-center animate-fade-in bg-[#fdfcf9] relative overflow-hidden">
                <div class="absolute -top-24 -left-24 w-64 h-64 bg-[#c68b6d]/5 rounded-full blur-[100px]"></div>
                
                <div class="w-32 h-32 bg-slate-50 rounded-[2.5rem] flex items-center justify-center mb-10 relative">
                    <i data-lucide="lock" class="w-12 h-12 text-[#c68b6d]"></i>
                    <div class="absolute -bottom-2 -right-2 bg-[#c68b6d] text-white p-2 rounded-xl shadow-lg">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                    </div>
                </div>
                
                <h2 class="text-4xl font-black text-slate-900 mb-4 tracking-tight leading-none">Contenido Exclusivo</h2>
                <p class="text-lg text-slate-500 mb-12 leading-relaxed px-4 text-justify">
                    Para acceder a nuestra biblioteca completa de planes y guardar tu progreso personal, te invitamos a unirte oficialmente a <b>La Casa de Juanita</b>.
                </p>
                
                <div class="space-y-4 w-full px-4">
                    <button @click="authMode = 'register'; authStep = 'input'; view = 'auth'" class="btn-primary py-5 text-lg shadow-xl">CREAR CUENTA GRATIS</button>
                    <button @click="view = 'discover'" class="w-full py-5 text-slate-400 font-black text-xs tracking-widest uppercase hover:text-[#c68b6d] transition-colors">TAL VEZ MÁS TARDE</button>
                </div>
            </div>
        </template>

        <!-- NAV INFERIOR -->
        <nav x-show="['home', 'reading', 'bible', 'discover', 'plan_overview', 'more'].includes(view)" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass rounded-[2rem] px-6 py-4 flex justify-between items-center z-50 shadow-2xl shadow-black/5">
            <div @click="view = 'home'" class="flex flex-col items-center gap-1 cursor-pointer transition-all duration-300" :class="view === 'home' ? 'text-[#c68b6d] scale-105' : 'text-slate-300 hover:text-slate-400'">
                <i data-lucide="heart" :class="view === 'home' ? 'fill-current' : ''" class="w-5 h-5"></i>
                <span class="text-[8px] font-black uppercase tracking-[0.1em]">Hoy</span>
            </div>
            <div @click="view = 'bible'" class="flex flex-col items-center gap-1 cursor-pointer transition-all duration-300" :class="view === 'bible' ? 'text-[#c68b6d] scale-105' : 'text-slate-300 hover:text-slate-400'">
                <i data-lucide="book" :class="view === 'bible' ? 'fill-current' : ''" class="w-5 h-5"></i>
                <span class="text-[8px] font-black uppercase tracking-[0.1em]">Biblia</span>
            </div>
            <div @click="view = 'discover'" class="flex flex-col items-center gap-1 cursor-pointer transition-all duration-300" :class="view === 'discover' ? 'text-[#c68b6d] scale-105' : 'text-slate-300 hover:text-slate-400'">
                <i data-lucide="compass" :class="view === 'discover' ? 'fill-current' : ''" class="w-5 h-5"></i>
                <span class="text-[8px] font-black uppercase tracking-[0.1em]">Planes</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-slate-200 cursor-not-allowed opacity-30">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-[8px] font-black uppercase tracking-[0.1em]">Amigos</span>
            </div>
            <div @click="view = 'more'" class="flex flex-col items-center gap-1 cursor-pointer transition-all duration-300" :class="view === 'more' ? 'text-[#c68b6d] scale-105' : 'text-slate-300 hover:text-slate-400'">
                <i data-lucide="more-horizontal" :class="view === 'more' ? 'fill-current' : ''" class="w-5 h-5"></i>
                <span class="text-[8px] font-black uppercase tracking-[0.1em]">Más</span>
            </div>
        </nav>

        <div class="hidden sm:block absolute top-0 left-1/2 -translate-x-1/2 w-36 h-7 bg-slate-50/50 backdrop-blur-md rounded-b-[1.5rem] z-[60] border-x border-b border-slate-100 text-center"></div>
    </div>
</body>
</html>
